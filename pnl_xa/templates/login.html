<!DOCTYPE html>
<html>
<head>
    <title>🔐 Acceso al Panel - Hacker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        .login-container {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #e94560;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 0 40px rgba(233, 69, 96, 0.2);
        }
        
        .login-container h1 {
            color: #e94560;
            text-align: center;
            font-size: 28px;
            margin-bottom: 30px;
        }
        
        .login-container h1 span {
            display: block;
            font-size: 14px;
            color: #888;
            font-weight: normal;
            margin-top: 5px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #eee;
            font-size: 14px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #0d1b2a;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.3);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-login:hover {
            background: #c73e54;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            border-left: 4px solid #c62828;
        }
        
        .info {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 20px;
        }
        
        .info a {
            color: #e94560;
            text-decoration: none;
        }
        
        .info a:hover {
            text-decoration: underline;
        }
        
        .icon-lock {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="icon-lock">🔐</div>
        <h1>
            Panel del Hacker
            <span>Ingresa tus credenciales</span>
        </h1>
        
        {% if form.errors %}
        <div class="error-message">
            ❌ Usuario o contraseña incorrectos. Intentá de nuevo.
        </div>
        {% endif %}
        
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_username">👤 Usuario</label>
                <input type="text" name="username" id="id_username" placeholder="Ingresa tu usuario" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="id_password">🔑 Contraseña</label>
                <input type="password" name="password" id="id_password" placeholder="Ingresa tu contraseña" required>
            </div>
            
            <button type="submit" class="btn-login">🚀 Acceder al Panel</button>
            
            <input type="hidden" name="next" value="{{ next }}">
        </form>
        
        <div class="info">
            🔒 Acceso restringido - Solo para personal autorizado
        </div>
    </div>
</body>
</html>
